<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>completion タグ ジェネレーター</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 24px;
      color: #111;
    }

    /* ログイン画面 */
    #login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 20px;
      text-align: center;
    }
    #login-section p {
      color: #555;
      font-size: 0.95rem;
      margin: 0;
    }
    #error-msg {
      color: #cc0000;
      font-size: 0.88rem;
      display: none;
    }

    /* ツール画面 */
    #tool-section {
      display: none;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
      background: #fff;
    }
    .hint {
      font-size: 0.8rem;
      color: #777;
      margin: 4px 0 8px;
      line-height: 1.7;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0,102,204,0.15);
    }
    .output-wrapper {
      position: relative;
      margin-top: 24px;
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
      background: #1e1e1e;
      color: #d4d4d4;
      resize: vertical;
      box-sizing: border-box;
      line-height: 1.6;
    }
    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 14px;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .copy-btn:hover {
      background: #0052a3;
    }
    .copy-btn.copied {
      background: #28a745;
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-section">
    <h1>completion タグ ジェネレーター</h1>
    <p>@smartnews.com アカウントでログインしてください</p>
    <div id="g_id_onload"
      data-client_id="760825137208-gt8p91r6i80k7ep26f5qsvlu4e622qr8.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-text="signin_with"
      data-locale="ja">
    </div>
    <p id="error-msg">@smartnews.com のアカウントでログインしてください</p>
  </div>

  <!-- ツール画面 -->
  <div id="tool-section">
    <h1>completion タグ ジェネレーター</h1>

    <div class="field">
      <label for="correctnessNum">correctnessNum（ミッションをクリアするのに必要な正解数を入力）</label>
      <input type="number" id="correctnessNum" value="2" min="0">
    </div>

    <div class="field">
      <label for="missionId">missionId（クイズのミッションIDを記入）</label>
      <input type="text" id="missionId" placeholder="例: 808921308625879719">
    </div>

    <div class="field">
      <label for="ctaUrl">ctaUrl（MissionのDeeplinkを入力）</label>
      <p class="hint">
        ＜Deeplink発行方法＞<br>
        1. Mission Admin にログイン<br>
        2. キャンペーンの [META] タブの最下部にある [Deeplink] → [GENERATE DEEPLINK] を押下<br>
        3. [Referrer] に「quiz」と入力すると、DeepLink が発行される
      </p>
      <input type="text" id="ctaUrl" placeholder="例: smartnews://openBridgeLink?url=...">
    </div>

    <div class="output-wrapper">
      <textarea id="output" readonly></textarea>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">コピー</button>
    </div>
  </div>

  <script>
    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email;

      if (email.endsWith('@smartnews.com')) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('tool-section').style.display = 'block';
        generate();
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    function generate() {
      const correctnessNum = parseInt(document.getElementById('correctnessNum').value) || 0;
      const missionId = document.getElementById('missionId').value;
      const ctaUrl = document.getElementById('ctaUrl').value;

      const json = `,"completion": {
    "correctnessNum": ${correctnessNum},
    "reward": {
      "type": "mission",
      "missionId": "${missionId}",
      "openAction": "close",
      "ctaText": "ミッションに戻る",
      "ctaUrl": "${ctaUrl}"
    }
  }}`;

      document.getElementById('output').value = json;
    }

    function copyOutput() {
      const output = document.getElementById('output');
      navigator.clipboard.writeText(output.value).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'コピー完了!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('input', generate);
    });
  </script>
</body>
</html>
